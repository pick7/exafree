name: Docker Build

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: exafree
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: exafree-smoke:latest

      - name: Smoke-test container
        run: |
          docker run -d --rm --name exafree-smoke -p 7860:7860 exafree-smoke:latest
          trap 'docker logs exafree-smoke || true; docker stop exafree-smoke || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:7860/health > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:7860/health
          curl -fsS http://127.0.0.1:7860/ > /dev/null

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
